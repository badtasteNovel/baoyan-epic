apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: valkey
    {{ include "base.metadata.labels.managed_by" . | nindent 4 }}
  name: valkey
  namespace: {{ .Release.Namespace }}
  annotations:
    {{ include "base.metadata.annotations.release" . | nindent 4 }}
spec:
  selector:
    io.kompose.service: valkey
  ports:
    - protocol: TCP
      port: 6379           # 其他 Pod 訪問 php-fpm 時用的 Port
      targetPort: 6379     # php-fpm 容器內實際聽的 Port

