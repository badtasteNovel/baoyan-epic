map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
# 運用volumes 將這個default.conf 掛載到nginx.conf 的位置
server {
    listen 80;   # 指定為預設 server
    server_name _;
    root /var/www/html/public;
    index index.php index.html;
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    # = 最高優先級，必須完全匹配
    # ^~ 次高優先級，前綴匹配，但禁止再往下找正則，所以我們後面接正則就不能使用
    # ~ 或者 ~* 正則匹配，優先級略高於 / 
    # / 最低優先級，前綴匹配
    location ^~ /app/ {
        proxy_http_version 1.1;
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;  # 設定為 7 天，基本上等於不斷開
        
		proxy_set_header Host $http_host;
		proxy_set_header Scheme $scheme;
		proxy_set_header SERVER_PORT $server_port;
		proxy_set_header REMOTE_ADDR $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection $connection_upgrade;
		
		proxy_pass http://php-reverb:8080;
    }
    # 這裡的~ ^ 就是正則了。
    location ~ ^/apps/(?<reverbid>[^/]+)/events$ { # variable reverbid
        proxy_http_version 1.1;
        proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		
		proxy_pass http://php-reverb:8080/apps/$reverbid/events$is_args$args;
    }
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php-fpm:9000; # 指向容器名稱
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ /\.ht {
        deny all;
    }
}
